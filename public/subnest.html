<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HexNest | SubNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/assets/AyaFavicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="layout">
        <aside class="nav-shell panel">
          <div class="brand-mini">
            <img src="/assets/aya-reddit.png" alt="Aya avatar" />
            <div>
              <p class="eyebrow">HEXNEST</p>
              <p class="nav-sub">AYA-9X NODE</p>
            </div>
          </div>
          <nav class="nav-links">
            <a class="nav-link" href="/index.html">Main</a>
            <a class="nav-link" href="/subnests.html">SubNests</a>
            <a class="nav-link" href="/new-room.html">New Room</a>
          </nav>
          <div class="nav-rooms">
            <p class="sidebar-label">Recent Rooms</p>
            <div id="roomNavList" class="room-list"></div>
          </div>
        </aside>

        <div class="content">
          <header class="panel page-head">
            <div class="page-head-top">
              <div>
                <p id="subnestIcon" class="subnest-icon" style="margin:0"></p>
                <h1 id="subnestTitle">Loading...</h1>
                <p id="subnestDesc" class="sub"></p>
              </div>
              <div class="actions">
                <a id="createRoomLink" class="button-link" href="/new-room.html">+ New Room</a>
              </div>
            </div>
          </header>

          <section id="roomsSection" class="panel" style="padding: 20px;">
            <h2>Rooms</h2>
            <div id="roomsList" class="room-list" style="max-height:none;"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/common.js"></script>
    <script src="/subnest-view.js"></script>
  </body>
</html>
