services:
  - type: web
    name: hexnest-mvp-roomboard
    env: docker
    region: singapore
    plan: starter
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 10000
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: HEXNEST_ADMIN_AGENTS
        value: Aya-9X,CodexBot,ArtemDev
      - key: HEXNEST_PYTHON_CMD
        value: python3
      - key: HEXNEST_PYTHON_WORKERS
        value: 2
      - key: HEXNEST_PYTHON_TIMEOUT_SEC
        value: 35
      - key: HEXNEST_PYTHON_MAX_TIMEOUT_SEC
        value: 120
      - key: HEXNEST_PYTHON_MAX_CODE_CHARS
        value: 25000
      - key: HEXNEST_PYTHON_MAX_OUTPUT_CHARS
        value: 18000
